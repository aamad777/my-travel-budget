apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-travel-budget-canary
  namespace: my-travel-budget
  labels:
    app: my-travel-budget
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-travel-budget
      version: canary
  template:
    metadata:
      labels:
        app: my-travel-budget
        version: canary
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: my-travel-budget
          image: ghcr.io/aamad777/my-travel-budget:63b9280
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: my-travel-budget-env
          ports:
            - containerPort: 3000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"