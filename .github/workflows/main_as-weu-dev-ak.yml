# Docs for the Azure Web Apps Deploy action:
# https://github.com/Azure/webapps-deploy
#
# This workflow:
# 1. Builds the Vite React application
# 2. Uploads only the generated dist folder
# 3. Authenticates to Azure using OIDC
# 4. Deploys the built static files to Azure App Service

name: Build and deploy Vite React app to Azure Web App - AS-WEU-DEV-AK

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Vite application
        run: npm run build

      - name: Verify build output
        run: |
          echo "Contents of dist:"
          ls -la dist

          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: dist/index.html was not created."
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vite-dist
          path: dist

      - name: Verify downloaded artifact
        run: |
          echo "Downloaded deployment files:"
          ls -la dist

          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: dist/index.html is missing."
            exit 1
          fi

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6E569F2ACF584FEBAC832276F6D5BB95 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F9A3FB25F726432EBCDC9CC642824FE9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6EE5F30B8542409FB35E5BD2F91C2951 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "AS-WEU-DEV-AK"
          slot-name: "Production"
          package: ./dist
