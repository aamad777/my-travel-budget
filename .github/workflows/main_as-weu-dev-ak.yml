name: Inspect TanStack build output

on:
  workflow_dispatch:

jobs:
  inspect-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Show build output
        run: |
          echo "===== DIST DIRECTORIES ====="
          find dist -maxdepth 6 -type d -print

          echo "===== DIST FILES ====="
          find dist -maxdepth 6 -type f -print
