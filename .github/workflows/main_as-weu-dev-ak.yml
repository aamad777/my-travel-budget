name: Build and deploy TanStack Start app to Azure Web App - AS-WEU-DEV-AK

on:
  push:
    branches:
      - azure-appservice-deploy

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Supabase secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "ERROR: GitHub secret SUPABASE_URL is missing."
            exit 1
          fi

          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "ERROR: GitHub secret SUPABASE_PUBLISHABLE_KEY is missing."
            exit 1
          fi

          echo "Supabase secrets are available to the workflow."
          echo "Supabase URL length: ${#VITE_SUPABASE_URL}"
          echo "Supabase key length: ${#VITE_SUPABASE_PUBLISHABLE_KEY}"

      - name: Build Azure Node application
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build:azure

      - name: Verify Azure build output
        run: |
          if [ ! -f ".output/server/index.mjs" ]; then
            echo "ERROR: .output/server/index.mjs was not created."
            exit 1
          fi

          echo "Azure server output exists."

      - name: Verify Supabase URL was embedded
        run: |
          if grep -R -q "supabase.co" .output/public; then
            echo "Supabase URL was embedded in the browser bundle."
          else
            echo "ERROR: Supabase URL was not embedded in .output/public."
            exit 1
          fi

      - name: Prepare deployment package
        run: |
          rm -rf deployment
          mkdir -p deployment

          cp -R .output deployment/.output
          cp package.json deployment/package.json
          cp package-lock.json deployment/package-lock.json

          echo "Deployment package prepared."
          find deployment -maxdepth 4 -type f -print

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: tanstack-azure-package
          path: deployment
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: tanstack-azure-package
          path: deployment

      - name: Verify downloaded package
        run: |
          if [ ! -f "deployment/.output/server/index.mjs" ]; then
            echo "ERROR: deployment/.output/server/index.mjs is missing."
            exit 1
          fi

          echo "Deployment package verified."

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6E569F2ACF584FEBAC832276F6D5BB95 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F9A3FB25F726432EBCDC9CC642824FE9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6EE5F30B8542409FB35E5BD2F91C2951 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "AS-WEU-DEV-AK"
          slot-name: "Production"
          package: ./deployment
